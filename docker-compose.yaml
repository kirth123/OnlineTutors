services:

  frontend:
    build: 
      context: ./client
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - 80:80
      - 443:443
    volumes:
      - /etc/letsencrypt/live/www.onlinetutorstoday.net:/etc/letsencrypt/live/www.onlinetutorstoday.net
    networks:
      - app-network

  backend:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: backend
    ports:
      - 8080:8080
    environment:
      - TZ:"America/New_York"
    volumes:
      - /etc/letsencrypt/live/www.onlinetutorstoday.net:/etc/letsencrypt/live/www.onlinetutorstoday.net
    networks:
      - app-network  

networks:
  app-network:
    driver: bridge
